<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ER Triage Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>ER Triage Control</h2>
        
        <div class="control-group">
            <label>Patient Name:</label>
            <input type="text" id="pName" placeholder="e.g. John Doe">
        </div>
        
        <div class="control-group">
            <label>Severity (1 = Critical, 10 = Minor):</label>
            <input type="number" id="pSeverity" min="1" max="10" value="5">
        </div>
        
        <button onclick="admitPatient()">Admit Patient</button>
        <hr>
        <button onclick="treatPatient()" class="treat-btn">Doctor Ready (Treat Next)</button>
        
        <hr>
        <h3>Manage Patient</h3>
        <div class="control-group">
            <label>Name:</label>
            <input type="text" id="manageName" placeholder="Exact name">
        </div>
        <div class="control-group">
            <label>Current Severity:</label>
            <input type="number" id="currentSev" min="1" max="10">
        </div>
        <div class="control-group">
            <label>New Severity (Decrease Only):</label>
            <input type="number" id="newSev" min="1" max="10">
        </div>
        <button onclick="changeSeverity()">Switch Severity</button>
        <button onclick="removePatient()" class="treat-btn">Delete Patient</button>

        <button onclick="resetHospital()" style="background-color: #7f8c8d; margin-top: 20px;">Clear All Records</button>
        
        <div id="statusMessage"></div>
    </div>

    <div class="canvas-container">
        <div class="board">
            <h3>Waiting Room (Binomial Heap)</h3>
            <div class="canvas-scroll-wrapper">
                <canvas id="heapCanvas" width="2500" height="500"></canvas>
            </div>
        </div>

        <div class="board">
            <h3>Patient Records (Red-Black Tree)</h3>
            <div class="canvas-scroll-wrapper">
                <canvas id="rbtCanvas" width="2500" height="500"></canvas>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
